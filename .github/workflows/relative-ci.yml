name: RelativeCI Bundle Analysis

on:
  pull_request:
    paths:
      - frontend/**
      - .github/workflows/relative-ci.yml
  push:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/relative-ci.yml
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build

      # Vite/Rollup emits a webpack-stats-compatible JSON via
      # rollup-plugin-webpack-stats (wired in vite.config.ts). The TanStack
      # Start build produces both a client and a server bundle — only the
      # client one is what end users download, so that's what we ship.
      - name: Send bundle stats to RelativeCI
        uses: relative-ci/agent-action@v3
        with:
          webpackStatsFile: ./frontend/dist/client/webpack-stats.json
          key: ${{ secrets.RELATIVE_CI_KEY }}
          token: ${{ secrets.GITHUB_TOKEN }}
