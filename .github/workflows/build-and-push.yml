name: Build and push Docker image
on:
  push:
    branches:
      - main
    paths-ignore:
      - .*/**
      - deploy/**
      - infrastructure/**
      - scripts/**
      - "**/README.md"
  pull_request:
    branches:
      - main

env:
  version: "1.0.0-ci${{ github.run_id }}"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v2.3.4
        with:
          submodules: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.5.0

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx
          restore-keys: |
            ${{ runner.os }}-buildx

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1.9.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure tags are in sync
        run: diff frontend/src/tags.json backend/tags.json

      - name: Build backend base image
        uses: docker/build-push-action@v2.4.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: build
          push: false
          load: true
          build-args: |
            version=${{ env.version }}
            build_branch=${{ github.ref }}
            build_sha=${{ github.sha }}
            build_uri=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          tags: ${{ github.repository }}/build:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Run tests
        run: |
          docker run --rm ${{ github.repository }}/build:ci test \
            --no-restore --no-build --configuration Release \
            --verbosity normal --logger trx --filter Type=Fast

      - name: Build and push - fbsr
        uses: docker/build-push-action@v2.4.0
        with:
          context: ./fbsr
          file: ./fbsr/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/fbsr:${{ env.version }}
            ghcr.io/${{ github.repository }}/fbsr:ci
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/fbsr:ci
          cache-to: type=inline
          labels: |
            org.opencontainers.image.version=${{ env.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref }}

      - name: Build and push - web
        uses: docker/build-push-action@v2.4.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            version=${{ env.version }}
            build_branch=${{ github.ref }}
            build_sha=${{ github.sha }}
            build_uri=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ env.version }}
            ghcr.io/${{ github.repository }}/web:ci
          labels: |
            org.opencontainers.image.version=${{ env.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref }}

      - name: Build and push - api
        uses: docker/build-push-action@v2.4.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: api
          push: true
          build-args: |
            version=${{ env.version }}
            build_branch=${{ github.ref }}
            build_sha=${{ github.sha }}
            build_uri=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ env.version }}
            ghcr.io/${{ github.repository }}/api:ci
          labels: |
            org.opencontainers.image.version=${{ env.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref }}

      - name: Build and push - identity
        uses: docker/build-push-action@v2.4.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: identity
          push: true
          build-args: |
            version=${{ env.version }}
            build_branch=${{ github.ref }}
            build_sha=${{ github.sha }}
            build_uri=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          tags: |
            ghcr.io/${{ github.repository }}/identity:${{ env.version }}
            ghcr.io/${{ github.repository }}/identity:ci
          labels: |
            org.opencontainers.image.version=${{ env.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref }}

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_REPO: ${{ github.repository }}
      IMAGE_TAG: 1.0.0-ci${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate dev TLS certificate
        # docker-compose mounts .local/dev-certificate.pfx into the api +
        # identity containers as their data-protection key. Generate a throwaway
        # one for CI — never committed to the repo.
        run: |
          cd .local
          bash ../scripts/generate-certificate.sh
          mv certificate.pfx dev-certificate.pfx

      - name: Map local.factorio.tech hostnames to localhost
        run: |
          echo "127.0.0.1 local.factorio.tech api.local.factorio.tech identity.local.factorio.tech" \
            | sudo tee -a /etc/hosts

      - name: Start stack
        run: |
          docker compose -f docker-compose.yaml -f docker-compose.ci.yaml up -d

      - name: Wait for API to be seeded
        # Poll the test fixture's own endpoint — a 200 here proves both that
        # the API is up AND that DevDataSeeder ran successfully. A bare /builds
        # check would pass with an empty list if the seed gist fetch silently
        # failed (the seeder logs and returns rather than throwing).
        run: |
          for i in $(seq 1 60); do
            if curl -ksfo /dev/null https://api.local.factorio.tech/builds/brian-white/brians-bootstrap; then
              echo "API seeded after ${i} attempts"
              exit 0
            fi
            sleep 5
          done
          echo "::error::API did not seed within 5 minutes"
          docker compose -f docker-compose.yaml -f docker-compose.ci.yaml logs --tail=200 api identity
          exit 1

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        env:
          E2E_BASE_URL: https://local.factorio.tech
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.yaml -f docker-compose.ci.yaml logs --tail=500

  deploy:
    environment:
      name: staging
      url: https://factorio.tech
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - e2e
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2.3.4

      - name: Login to AKS
        uses: azure/aks-set-context@v1.1
        with:
            creds: "${{ secrets.AZURE_CREDENTIALS }}"
            resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
            cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v1.1

      - name: Package Helm chart
        run: |
          helm package ./deploy \
            --version ${{ env.version }} \
            --app-version ${{ env.version }}

      - name: Deploy Helm chart to AKS
        run: |
          helm upgrade factorio-tech factorio-tech-${{ env.version }}.tgz \
            --install --atomic \
            --values deploy/values.yaml \
            --set-string hostNames.web=${{ secrets.HOSTNAME_WEB }} \
            --set-string hostNames.api=${{ secrets.HOSTNAME_API }} \
            --set-string hostNames.identity=${{ secrets.HOSTNAME_IDENTITY }} \
            --set-string postgres.database=${{ secrets.POSTGRES_DATABASE }} \
            --set-string postgres.username=${{ secrets.POSTGRES_USERNAME }} \
            --set-string postgres.password=${{ secrets.POSTGRES_PASSWORD }} \
            --set-string postgres.diskName=${{ secrets.POSTGRES_DISK_NAME }} \
            --set-string postgres.diskURI=${{ secrets.POSTGRES_DISK_URI }} \
            --set-string web.clientId=${{ secrets.WEB_CLIENT_ID }} \
            --set-string web.clientSecret=${{ secrets.WEB_CLIENT_SECRET }} \
            --set-string identity.providers[0].name=GitHub \
            --set-string identity.providers[0].clientId=${{ secrets.OAUTH_GITHUB_CLIENT_ID }} \
            --set-string identity.providers[0].clientSecret=${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }} \
            --set-string identity.providers[1].name=Discord \
            --set-string identity.providers[1].clientId=${{ secrets.OAUTH_DISCORD_CLIENT_ID }} \
            --set-string identity.providers[1].clientSecret=${{ secrets.OAUTH_DISCORD_CLIENT_SECRET }}
